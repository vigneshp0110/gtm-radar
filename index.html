<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GTM Radar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:           #f5f5fb;
      --surface:      #ffffff;
      --card:         #ffffff;
      --card-hover:   #fafaff;
      --border:       #e8e8f0;
      --border-hover: #c7c7e8;
      --primary:      #6366f1;
      --primary-dim:  rgba(99,102,241,.08);
      --primary-glow: rgba(99,102,241,.15);
      --accent:       #8b5cf6;
      --text:         #1a1a2e;
      --text-2:       #5b5b7a;
      --muted:        #9898b8;
      --subtle:       #ededf8;
    }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--muted); }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      position: relative;
    }
    /* Very subtle tinted gradient behind page */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background:
        radial-gradient(ellipse 55% 40% at 15% 0%,   rgba(99,102,241,.07)  0%, transparent 70%),
        radial-gradient(ellipse 45% 35% at 85% 90%,  rgba(139,92,246,.05)  0%, transparent 65%);
    }
    body > * { position: relative; z-index: 1; }

    a { color: inherit; text-decoration: none; }
    button { cursor: pointer; border: none; background: none; color: inherit; font: inherit; }

    /* ── Header ── */
    header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(255,255,255,.88);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      display: flex; align-items: center; gap: 16px;
      height: 58px;
      box-shadow: 0 1px 3px rgba(0,0,0,.05);
    }

    .logo {
      font-weight: 700; font-size: 15px; letter-spacing: -.3px;
      color: var(--text); white-space: nowrap;
      display: flex; align-items: center; gap: 9px;
    }
    .logo-icon {
      width: 28px; height: 28px; border-radius: 8px;
      background: linear-gradient(135deg, #6366f1 0%, #a78bfa 100%);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 2px 10px rgba(99,102,241,.3);
      flex-shrink: 0;
    }
    .logo-icon svg { color: #fff; }
    .logo-name { color: var(--text); }

    .search-wrap { flex: 1; max-width: 380px; position: relative; }
    .search-wrap svg {
      position: absolute; left: 11px; top: 50%; transform: translateY(-50%);
      color: var(--muted); pointer-events: none;
    }
    .search-wrap input {
      width: 100%; padding: 7px 12px 7px 34px;
      background: var(--subtle); border: 1px solid var(--border);
      border-radius: 10px; color: var(--text); font-size: 13px;
      font-family: inherit; outline: none; transition: border-color .2s, box-shadow .2s, background .2s;
    }
    .search-wrap input:focus {
      background: #fff;
      border-color: rgba(99,102,241,.5);
      box-shadow: 0 0 0 3px var(--primary-glow);
    }
    .search-wrap input::placeholder { color: var(--muted); }

    .header-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
    .pill-btn {
      display: flex; align-items: center; gap: 6px;
      padding: 6px 13px; border-radius: 8px; font-size: 12px; font-weight: 500;
      border: 1px solid var(--border); background: var(--surface);
      color: var(--text-2); transition: all .2s;
      box-shadow: 0 1px 2px rgba(0,0,0,.04);
    }
    .pill-btn:hover { border-color: var(--border-hover); color: var(--text); }
    .pill-btn.active {
      background: var(--primary-dim);
      border-color: rgba(99,102,241,.3);
      color: var(--primary);
    }
    #postCount { font-size: 12px; color: var(--muted); }

    /* ── App body ── */
    .app-body { display: flex; align-items: flex-start; }

    /* ── Sidebar ── */
    .sidebar {
      position: sticky; top: 58px;
      width: 210px; flex-shrink: 0;
      height: calc(100vh - 58px);
      overflow-y: auto;
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 20px 10px;
      display: flex; flex-direction: column; gap: 2px;
    }
    .sidebar-label {
      font-size: 10px; font-weight: 600; text-transform: uppercase;
      letter-spacing: .1em; color: var(--muted);
      padding: 0 10px; margin-bottom: 8px; margin-top: 4px;
    }
    .sidebar .tab {
      width: 100%; text-align: left;
      padding: 8px 10px; border-radius: 8px; font-size: 13px;
      font-weight: 500; border: none; color: var(--text-2);
      display: flex; align-items: center; gap: 9px;
      transition: all .15s;
    }
    .sidebar .tab:hover { background: var(--subtle); color: var(--text); }
    .sidebar .tab.active {
      background: var(--primary-dim);
      color: var(--primary);
    }
    .tab-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

    /* ── Main ── */
    .main-wrap {
      flex: 1; min-width: 0;
      max-width: 760px;
      padding: 26px 28px;
    }

    /* ── Filter bar ── */
    .filter-bar {
      display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
      margin-bottom: 20px;
    }
    .filter-label {
      font-size: 11px; color: var(--muted); font-weight: 500;
      text-transform: uppercase; letter-spacing: .07em; margin-right: 2px;
    }
    .date-controls { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .date-input {
      padding: 6px 10px; background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); font-size: 12px; font-family: inherit;
      outline: none; cursor: pointer; transition: border-color .2s, box-shadow .2s;
      box-shadow: 0 1px 2px rgba(0,0,0,.04);
    }
    .date-input:focus { border-color: rgba(99,102,241,.4); box-shadow: 0 0 0 3px var(--primary-glow); }
    .date-input::-webkit-calendar-picker-indicator { cursor: pointer; opacity: .5; }
    .sort-wrap { display: flex; align-items: center; gap: 6px; }
    .sort-select {
      padding: 6px 10px; background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); font-size: 12px; font-family: inherit;
      outline: none; cursor: pointer; transition: border-color .2s;
      box-shadow: 0 1px 2px rgba(0,0,0,.04);
    }
    .sort-select:focus { border-color: rgba(99,102,241,.4); }

    /* ── Stats bar ── */
    .stats-bar {
      display: grid; grid-template-columns: repeat(4,1fr);
      gap: 12px; margin-bottom: 24px;
    }
    .stat {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px; padding: 18px 20px;
      display: flex; flex-direction: column; gap: 6px;
      box-shadow: 0 1px 4px rgba(0,0,0,.05);
      transition: box-shadow .2s, border-color .2s, transform .2s;
    }
    .stat:hover {
      border-color: var(--border-hover);
      box-shadow: 0 4px 16px rgba(99,102,241,.1);
      transform: translateY(-1px);
    }
    .stat-val {
      font-size: 26px; font-weight: 700; letter-spacing: -.8px;
      background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .stat-key { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; font-weight: 500; }

    /* ── Feed ── */
    .feed { display: flex; flex-direction: column; gap: 10px; }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px; padding: 20px 22px;
      box-shadow: 0 1px 3px rgba(0,0,0,.05);
      transition: border-color .2s, box-shadow .25s, transform .2s;
    }
    .card:hover {
      border-color: var(--border-hover);
      box-shadow: 0 6px 28px rgba(99,102,241,.1), 0 2px 8px rgba(0,0,0,.06);
      transform: translateY(-1px);
    }

    .card-header { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 14px; }
    .avatar {
      width: 40px; height: 40px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 14px; flex-shrink: 0; color: #fff;
    }
    .person-info { flex: 1; min-width: 0; }
    .person-name {
      font-weight: 600; font-size: 14px; color: var(--text);
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    }
    .person-meta { font-size: 12px; color: var(--text-2); margin-top: 2px; }
    .badge {
      display: inline-flex; align-items: center;
      padding: 2px 9px; border-radius: 20px; font-size: 11px; font-weight: 500;
      flex-shrink: 0;
    }
    .card-date { font-size: 11px; color: var(--muted); white-space: nowrap; margin-top: 2px; }

    .card-body {
      font-size: 14px; color: var(--text-2); line-height: 1.72;
      margin-bottom: 16px; white-space: pre-line;
    }
    .card-body .read-more {
      color: var(--primary); font-size: 13px; cursor: pointer;
      display: inline; font-weight: 500;
    }
    .card-body .read-more:hover { opacity: .75; }

    .card-footer {
      display: flex; align-items: center; gap: 16px; padding-top: 14px;
      border-top: 1px solid var(--border);
    }
    .metric {
      display: flex; align-items: center; gap: 5px;
      font-size: 12px; color: var(--muted);
    }
    .metric svg { flex-shrink: 0; }
    .metric strong { color: var(--text-2); font-weight: 600; }
    .card-link {
      margin-left: auto; font-size: 12px; color: var(--primary);
      display: flex; align-items: center; gap: 4px; font-weight: 500;
      opacity: .7; transition: opacity .15s;
    }
    .card-link:hover { opacity: 1; }

    /* ── Empty state ── */
    .empty { text-align: center; padding: 80px 20px; color: var(--muted); }
    .empty svg { margin-bottom: 16px; opacity: .3; }
    .empty p { font-size: 14px; }

    /* ── Config banner ── */
    .config-banner {
      display: flex; align-items: center; gap: 12px;
      background: rgba(99,102,241,.05); border: 1px solid rgba(99,102,241,.15);
      border-radius: 12px; padding: 12px 16px; margin-bottom: 20px;
      font-size: 13px; color: var(--text-2);
    }
    .config-banner a { color: var(--primary); text-decoration: underline; }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .sidebar { display: none; }
      .main-wrap { padding: 16px; }
      .stats-bar { grid-template-columns: repeat(2,1fr); }
      .filter-bar { flex-direction: column; align-items: flex-start; }
      .date-controls { flex-wrap: wrap; }
    }
  </style>
</head>
<body>

<!-- ═══════════ HEADER ═══════════ -->
<header>
  <div class="logo">
    <div class="logo-icon">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="2"/><path d="M16.24 7.76a6 6 0 0 1 0 8.49m-8.48-.01a6 6 0 0 1 0-8.49m11.31-2.82a10 10 0 0 1 0 14.14m-14.14 0a10 10 0 0 1 0-14.14"/>
      </svg>
    </div>
    <span class="logo-name">GTM Radar</span>
  </div>
  <div class="search-wrap">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input type="text" id="searchInput" placeholder="Search posts or people…" />
  </div>
  <div class="header-right">
    <button class="pill-btn active" id="last7Btn" onclick="toggleLast7()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
      </svg>
      Last 7 days
    </button>
    <span id="postCount" style="font-size:13px;color:var(--muted)"></span>
  </div>
</header>

<div class="app-body">

<!-- ═══════════ SIDEBAR ═══════════ -->
<nav class="sidebar" id="sidebar">
  <div class="sidebar-label">Function</div>
  <!-- tabs injected by JS -->
</nav>

<div class="main-wrap">

  <!-- Config banner (shown when no sheet URL is set) -->
  <div class="config-banner" id="configBanner" style="display:none">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
    </svg>
    <span>Running on mock data. To connect your sheet: publish it as CSV, then set <code>SHEET_CSV_URL</code> at the top of this file's script. <a href="#" onclick="document.getElementById('configBanner').style.display='none';return false">Dismiss</a></span>
  </div>

  <!-- ── Filter bar ── -->
  <div class="filter-bar">
    <div class="date-controls">
      <span class="filter-label">From</span>
      <input type="date" class="date-input" id="dateFrom" onchange="applyFilters()" />
      <span class="filter-label">To</span>
      <input type="date" class="date-input" id="dateTo" onchange="applyFilters()" />
    </div>
    <div class="sort-wrap" style="margin-left:auto">
      <span class="filter-label">Sort</span>
      <select class="sort-select" id="sortSelect" onchange="applyFilters()">
        <option value="engagement">Top Engagement</option>
        <option value="date">Most Recent</option>
        <option value="likes">Most Likes</option>
        <option value="comments">Most Comments</option>
      </select>
    </div>
  </div>

  <!-- ── Stats ── -->
  <div class="stats-bar" id="statsBar">
    <div class="stat"><div class="stat-val" id="sTotalPosts">—</div><div class="stat-key">Posts</div></div>
    <div class="stat"><div class="stat-val" id="sPeople">—</div><div class="stat-key">People</div></div>
    <div class="stat"><div class="stat-val" id="sTotalLikes">—</div><div class="stat-key">Total Likes</div></div>
    <div class="stat"><div class="stat-val" id="sAvgEng">—</div><div class="stat-key">Avg Engagement</div></div>
  </div>

  <!-- ── Feed ── -->
  <div class="feed" id="feed"></div>
  <div class="empty" id="emptyState" style="display:none">
    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
    </svg>
    <p>No posts match your current filters.</p>
  </div>

</div><!-- end main-wrap -->
</div><!-- end app-body -->

<script>
/* ═══════════════════════════════════════════════════
   CONFIG — paste your Google Sheet published CSV URL
   File → Share → Publish to web → Sheet "posts" → CSV
   ═══════════════════════════════════════════════════ */
const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vR-Oy6B5OGnEeiWMFfSmUTA9eA7QXe3jNqfEJ9a8HWd_0EIOr1qlaHCmnXD1XA_W--38UhmZ3CO0hYB/pub?gid=336027905&single=true&output=csv';

/* ── Function definitions ── */
const FUNCTIONS = [
  { key: 'All',                   label: 'All',           color: '#818cf8' },
  { key: 'ABM',                   label: 'ABM',           color: '#a78bfa' },
  { key: 'Demand Generation',     label: 'Demand Gen',    color: '#60a5fa' },
  { key: 'SEO',                   label: 'SEO',           color: '#34d399' },
  { key: 'Performance Marketing', label: 'Performance',   color: '#fbbf24' },
  { key: 'CRO',                   label: 'CRO',           color: '#f87171' },
  { key: 'Field Marketing',       label: 'Field',         color: '#38bdf8' },
  { key: 'Community Marketing',   label: 'Community',     color: '#f472b6' },
  { key: 'Product Marketing',     label: 'Product Mkt',   color: '#fb923c' },
];

function fnColor(fn) {
  const f = FUNCTIONS.find(f => f.key === fn);
  return f ? f.color : '#64748b';
}

/* ── Avatar colours (deterministic by name) ── */
const AVATAR_COLORS = ['#6366f1','#8b5cf6','#3b82f6','#10b981','#f59e0b','#ef4444','#06b6d4','#ec4899','#f97316'];
function avatarColor(name) {
  let h = 0;
  for (let c of name) h = (h * 31 + c.charCodeAt(0)) & 0xffffffff;
  return AVATAR_COLORS[Math.abs(h) % AVATAR_COLORS.length];
}
function initials(name) {
  return name.split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();
}

/* ── Date helpers ── */
function daysBetween(d1, d2) {
  return Math.round((d2 - d1) / (1000 * 60 * 60 * 24));
}
function fmtDate(dateStr) {
  const d = new Date(dateStr);
  const diff = daysBetween(d, new Date());
  if (diff === 0) return 'Today';
  if (diff === 1) return 'Yesterday';
  if (diff < 7)  return `${diff} days ago`;
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: diff > 300 ? 'numeric' : undefined });
}
function toISO(dateStr) {
  // handles both YYYY-MM-DD and MM/DD/YYYY
  if (!dateStr) return '';
  if (dateStr.includes('-')) return dateStr;
  const [m, d, y] = dateStr.split('/');
  return `${y}-${m.padStart(2,'0')}-${d.padStart(2,'0')}`;
}
function fmtNum(n) {
  n = parseInt(n) || 0;
  if (n >= 1000) return (n / 1000).toFixed(1) + 'k';
  return n.toString();
}

/* ══════════════════════════════════════════
   MOCK DATA  — mirrors the Google Sheet schema
   Columns: post_id, person_name, linkedin_username,
            function, company, post_content,
            post_date, likes, comments, shares, post_url
   ══════════════════════════════════════════ */
const today = new Date();
function daysAgo(n) {
  const d = new Date(today);
  d.setDate(d.getDate() - n);
  return d.toISOString().split('T')[0];
}

const MOCK_POSTS = [
  {
    post_id: '1', person_name: 'Chris Walker', linkedin_username: 'chriswalker', function: 'Demand Generation', company: 'Refine Labs',
    post_content: `Stop asking "how did you hear about us?" and start looking at dark social.\n\nBuyers have 3–7 touchpoints before they convert — and most of them are invisible to your attribution model. Podcasts, Slack communities, word of mouth, LinkedIn DMs.\n\nIf you're optimizing only what you can measure, you're optimizing for a fraction of reality. The best demand gen isn't captured in UTMs.`,
    post_date: daysAgo(1), likes: 4200, comments: 318, shares: 890, post_url: 'https://linkedin.com'
  },
  {
    post_id: '2', person_name: 'Sangram Vajre', linkedin_username: 'sangramvajre', function: 'ABM', company: 'GTM Partners',
    post_content: `ABM is not a technology. It's a strategy.\n\nToo many companies buy an ABM platform before they've aligned sales and marketing on who their ideal accounts actually are. The platform can't save you from that misalignment.\n\nStart with the list. Align on the list. Then automate the list.`,
    post_date: daysAgo(2), likes: 3100, comments: 247, shares: 540, post_url: 'https://linkedin.com'
  },
  {
    post_id: '3', person_name: 'Rand Fishkin', linkedin_username: 'randfishkin', function: 'SEO', company: 'SparkToro',
    post_content: `Google's AI Overviews are eating clicks — and the brands that built their entire traffic moat on organic search are now scared.\n\nHere's the uncomfortable truth: SEO was always a rented channel. The brands winning long-term are building audience, not just rankings. Email, community, social — own the relationship.`,
    post_date: daysAgo(2), likes: 5800, comments: 492, shares: 1200, post_url: 'https://linkedin.com'
  },
  {
    post_id: '4', person_name: 'Anthony Pierri', linkedin_username: 'anthonypierri', function: 'Product Marketing', company: 'FletchPMM',
    post_content: `Your homepage is talking to the wrong person.\n\nMost SaaS homepages try to speak to everyone — so they resonate with no one. The fix? Pick your ICP, describe the exact problem they feel, and make your hero section a direct answer to that problem.\n\nIf 3 different ICPs read your homepage and all think "this is for me" — something is wrong.`,
    post_date: daysAgo(3), likes: 2900, comments: 205, shares: 670, post_url: 'https://linkedin.com'
  },
  {
    post_id: '5', person_name: 'Peep Laja', linkedin_username: 'peeplaja', function: 'CRO', company: 'Wynter',
    post_content: `Message-market fit is underrated.\n\nYou can have product-market fit and still struggle to convert — because you haven't found the words your buyers use. Testing landing pages is really testing messaging. Run the tests. Survey your buyers. Read their exact language back to them.\n\nConversion is a messaging problem 80% of the time.`,
    post_date: daysAgo(3), likes: 3400, comments: 288, shares: 720, post_url: 'https://linkedin.com'
  },
  {
    post_id: '6', person_name: 'Ashley Faus', linkedin_username: 'ashleyfaus', function: 'Community Marketing', company: 'Atlassian',
    post_content: `Community isn't a growth hack. It's a long game.\n\nCompanies that build community for acquisition end up building a ghost town. The ones that build for genuine value — shared learning, peer connection, belonging — those communities compound over years.\n\nWhat are you giving before asking?`,
    post_date: daysAgo(4), likes: 1800, comments: 176, shares: 340, post_url: 'https://linkedin.com'
  },

/* ── App state ── */
let allPosts = [];
let activeFunc = 'All';
let last7Active = true;

/* ── Init ── */
async function init() {
  if (SHEET_CSV_URL) {
    document.getElementById('configBanner').style.display = 'none';
    try {
      allPosts = await loadFromSheet(SHEET_CSV_URL);
    } catch(e) {
      console.warn('Sheet load failed, falling back to mock data:', e.message);
      allPosts = MOCK_POSTS;
      // Show a soft warning banner
      const b = document.getElementById('configBanner');
      b.style.display = 'flex';
      b.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <span>Couldn't reach your sheet in this preview — showing mock data. <strong>It will work correctly when opened in Chrome or deployed to Vercel.</strong> <a href="#" onclick="document.getElementById('configBanner').style.display='none';return false">Dismiss</a></span>`;
    }
  } else {
    allPosts = MOCK_POSTS;
  }
  buildFuncTabs();
  applyFilters();
}

/* ── Load CSV from Google Sheet ── */
async function loadFromSheet(url) {
  // Try direct fetch first, then fall back to CORS proxy
  let text;
  try {
    const res = await fetch(url, { cache: 'no-cache' });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    text = await res.text();
  } catch (e) {
    // Try via CORS proxy
    const proxy = 'https://corsproxy.io/?' + encodeURIComponent(url);
    const res2 = await fetch(proxy, { cache: 'no-cache' });
    if (!res2.ok) throw new Error(`Proxy HTTP ${res2.status}`);
    text = await res2.text();
  }
  return parseCSV(text);
}

/* ── Parse CSV (handles quoted fields with commas/newlines) ── */
function parseCSV(text) {
  const rows = [];
  let row = [], field = '', inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    const ch = text[i], next = text[i + 1];
    if (inQuotes) {
      if (ch === '"' && next === '"') { field += '"'; i++; }
      else if (ch === '"') inQuotes = false;
      else field += ch;
    } else {
      if (ch === '"') inQuotes = true;
      else if (ch === ',') { row.push(field.trim()); field = ''; }
      else if (ch === '\n' || (ch === '\r' && next === '\n')) {
        row.push(field.trim()); rows.push(row); row = []; field = '';
        if (ch === '\r') i++;
      } else field += ch;
    }
  }
  if (field || row.length) { row.push(field.trim()); rows.push(row); }
  const [header, ...data] = rows.filter(r => r.some(c => c));
  return data.map(row => {
    const obj = {};
    header.forEach((h, i) => obj[h.trim()] = row[i] ?? '');
    return obj;
  });
}

/* ── Build function tabs (sidebar) ── */
function buildFuncTabs() {
  const presentFuncs = new Set(allPosts.map(p => p.function));
  const sidebar = document.getElementById('sidebar');
  // keep the label, rebuild everything after it
  sidebar.innerHTML = '<div class="sidebar-label">Function</div>';
  FUNCTIONS.forEach(f => {
    if (f.key !== 'All' && !presentFuncs.has(f.key)) return;
    const btn = document.createElement('button');
    btn.className = 'tab' + (f.key === activeFunc ? ' active' : '');
    const dot = document.createElement('span');
    dot.className = 'tab-dot';
    dot.style.background = f.color;
    btn.appendChild(dot);
    btn.appendChild(document.createTextNode(f.label));
    btn.onclick = () => {
      activeFunc = f.key;
      document.querySelectorAll('.sidebar .tab').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
      applyFilters();
    };
    sidebar.appendChild(btn);
  });
}

/* ── Main filter + render ── */
function applyFilters() {
  const search   = document.getElementById('searchInput').value.toLowerCase();
  const dateFrom = document.getElementById('dateFrom').value;
  const dateTo   = document.getElementById('dateTo').value;
  const sort     = document.getElementById('sortSelect').value;

  let posts = [...allPosts];

  // Function filter
  if (activeFunc !== 'All') posts = posts.filter(p => p.function === activeFunc);

  // Last 7 days
  if (last7Active) {
    const cutoff = new Date(); cutoff.setDate(cutoff.getDate() - 7);
    posts = posts.filter(p => new Date(toISO(p.post_date)) >= cutoff);
  }

  // Date range
  if (dateFrom) posts = posts.filter(p => toISO(p.post_date) >= dateFrom);
  if (dateTo)   posts = posts.filter(p => toISO(p.post_date) <= dateTo);

  // Search
  if (search) posts = posts.filter(p =>
    p.person_name.toLowerCase().includes(search) ||
    p.post_content.toLowerCase().includes(search) ||
    p.company.toLowerCase().includes(search)
  );

  // Sort
  posts.sort((a, b) => {
    if (sort === 'date')     return new Date(toISO(b.post_date)) - new Date(toISO(a.post_date));
    if (sort === 'likes')    return (parseInt(b.likes)||0) - (parseInt(a.likes)||0);
    if (sort === 'comments') return (parseInt(b.comments)||0) - (parseInt(a.comments)||0);
    // default: engagement = likes + comments + shares
    const engB = (parseInt(b.likes)||0) + (parseInt(b.comments)||0) + (parseInt(b.shares)||0);
    const engA = (parseInt(a.likes)||0) + (parseInt(a.comments)||0) + (parseInt(a.shares)||0);
    return engB - engA;
  });

  updateStats(posts);
  renderFeed(posts);
  document.getElementById('postCount').textContent = posts.length + ' posts';
}

/* ── Stats ── */
function updateStats(posts) {
  const people = new Set(posts.map(p => p.person_name)).size;
  const totalLikes = posts.reduce((s, p) => s + (parseInt(p.likes)||0), 0);
  const avgEng = posts.length
    ? Math.round(posts.reduce((s, p) => s + (parseInt(p.likes)||0) + (parseInt(p.comments)||0) + (parseInt(p.shares)||0), 0) / posts.length)
    : 0;
  document.getElementById('sTotalPosts').textContent = posts.length;
  document.getElementById('sPeople').textContent = people;
  document.getElementById('sTotalLikes').textContent = fmtNum(totalLikes);
  document.getElementById('sAvgEng').textContent = fmtNum(avgEng);
}

/* ── Render feed ── */
function renderFeed(posts) {
  const feed = document.getElementById('feed');
  const empty = document.getElementById('emptyState');
  if (!posts.length) { feed.innerHTML = ''; empty.style.display = 'block'; return; }
  empty.style.display = 'none';

  feed.innerHTML = posts.map(p => {
    const color = fnColor(p.function);
    const aColor = avatarColor(p.person_name);
    const eng = (parseInt(p.likes)||0) + (parseInt(p.comments)||0) + (parseInt(p.shares)||0);
    const content = (p.post_content || '').replace(/\\n/g, '\n');
    const truncLen = 280;
    const needsTrunc = content.length > truncLen;
    const shortContent = needsTrunc ? content.slice(0, truncLen) + '…' : content;
    const id = 'post_' + p.post_id;

    return `
    <div class="card">
      <div class="card-header">
        <div class="avatar" style="background:${aColor}">${initials(p.person_name)}</div>
        <div class="person-info">
          <div class="person-name">
            ${escHtml(p.person_name)}
            <span class="badge" style="background:${color}22;color:${color}">${escHtml(p.function)}</span>
          </div>
          <div class="person-meta">${escHtml(p.company)} · ${fmtDate(toISO(p.post_date))}</div>
        </div>
        <div class="card-date">${toISO(p.post_date)}</div>
      </div>
      <div class="card-body" id="${id}">
        ${escHtml(shortContent).replace(/\n/g, '<br>')}
        ${needsTrunc ? `<span class="read-more" onclick="expandPost('${id}', ${JSON.stringify(content)})"> Read more</span>` : ''}
      </div>
      <div class="card-footer">
        <div class="metric">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3H14z"/><path d="M7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3"/></svg>
          <strong>${fmtNum(p.likes)}</strong>&nbsp;Likes
        </div>
        <div class="metric">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          <strong>${fmtNum(p.comments)}</strong>&nbsp;Comments
        </div>
        <div class="metric">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
          <strong>${fmtNum(p.shares)}</strong>&nbsp;Shares
        </div>
        <div class="metric" style="color:${color}">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>
          <strong style="color:${color}">${fmtNum(eng)}</strong>&nbsp;Total
        </div>
        ${p.post_url ? `<a class="card-link" href="${escHtml(p.post_url)}" target="_blank" rel="noopener">
          View on LinkedIn
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        </a>` : ''}
      </div>
    </div>`;
  }).join('');
}

function expandPost(id, fullContent) {
  document.getElementById(id).innerHTML = escHtml(fullContent).replace(/\n/g, '<br>');
}

function escHtml(str) {
  return String(str || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

/* ── Last 7 toggle ── */
function toggleLast7() {
  last7Active = !last7Active;
  document.getElementById('last7Btn').classList.toggle('active', last7Active);
  if (last7Active) {
    document.getElementById('dateFrom').value = '';
    document.getElementById('dateTo').value = '';
  }
  applyFilters();
}

/* ── Search debounce ── */
let searchTimer;
document.getElementById('searchInput').addEventListener('input', () => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(applyFilters, 250);
});

/* ── Date range clears last 7 ── */
['dateFrom','dateTo'].forEach(id => {
  document.getElementById(id).addEventListener('change', () => {
    if (document.getElementById(id).value) {
      last7Active = false;
      document.getElementById('last7Btn').classList.remove('active');
    }
  });
});

/* ── Boot ── */
init();
</script>
